<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>API-Football - La Liga</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1,
        h2 {
            margin-bottom: 10px;
        }

        .contenedor {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .columna {
            width: 30%;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .card:hover {
            background-color: #f5f5f5;
        }

        img {
            vertical-align: middle;
            margin-right: 10px;
        }

        #detalleJugador {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            min-height: 150px;
        }
    </style>
</head>

<body>
    <h1>La Liga con API-Football</h1>

    <div class="contenedor">
        <div class="columna">
            <h2>Equipos</h2>
            <div id="equipos"></div>
        </div>

        <div class="columna">
            <h2>Plantilla</h2>
            <div id="jugadores"></div>
        </div>

        <div class="columna">
            <h2>Estadísticas del jugador</h2>
            <div id="detalleJugador">Selecciona un jugador</div>
        </div>
    </div>

    <script>
        const contenedorEquipos = document.getElementById("equipos");
        const contenedorJugadores = document.getElementById("jugadores");
        const detalleJugador = document.getElementById("detalleJugador");

        let estadisticasJugadores = [];

        async function cargarEquipos() {
            try {
                const response = await fetch("/equipos");
                const data = await response.json();

                contenedorEquipos.innerHTML = "";

                data.response.forEach(item => {
                    const team = item.team;

                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `
            <img src="${team.logo}" alt="${team.name}" width="24">
            ${team.name}
          `;

                    div.addEventListener("click", async () => {
                        await cargarEstadisticasJugadores(team.id);
                        await cargarPlantilla(team.id, team.name);
                    });

                    contenedorEquipos.appendChild(div);
                });
            } catch (error) {
                contenedorEquipos.textContent = "Error cargando equipos: " + error.message;
            }
        }

        async function cargarPlantilla(teamId, teamName) {
            try {
                const response = await fetch(`/plantilla/${teamId}`);
                const data = await response.json();

                contenedorJugadores.innerHTML = `<h3>${teamName}</h3>`;

                if (!data.response || data.response.length === 0) {
                    contenedorJugadores.innerHTML += "<p>No hay plantilla disponible.</p>";
                    return;
                }

                const jugadores = data.response[0].players;

                jugadores.forEach(jugador => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.textContent = `${jugador.name} - ${jugador.age} años - ${jugador.position || "Sin posición"}`;

                    div.addEventListener("click", () => {
                        mostrarEstadisticasJugador(jugador.id);
                    });

                    contenedorJugadores.appendChild(div);
                });
            } catch (error) {
                contenedorJugadores.textContent = "Error cargando plantilla: " + error.message;
            }
        }

        async function cargarEstadisticasJugadores(teamId) {
            try {
                detalleJugador.innerHTML = "<p>Cargando estadísticas...</p>";

                const response = await fetch(`/estadisticas-jugadores/${teamId}`);
                const data = await response.json();

                console.log("ESTADÍSTICAS DEL EQUIPO:", data);

                estadisticasJugadores = data.response || [];
            } catch (error) {
                detalleJugador.textContent = "Error cargando estadísticas: " + error.message;
            }
        }

        async function mostrarEstadisticasJugador(playerId) {
            try {
                detalleJugador.innerHTML = "<p>Cargando estadísticas del jugador...</p>";

                const response = await fetch(`/jugador/${playerId}`);
                const data = await response.json();

                console.log("DATOS JUGADOR:", data);

                if (!data.response || data.response.length === 0) {
                    detalleJugador.innerHTML = "<p>No se encontraron estadísticas para este jugador.</p>";
                    return;
                }

                const encontrado = data.response[0];
                const player = encontrado.player;
                const stats = encontrado.statistics && encontrado.statistics[0];

                if (!stats) {
                    detalleJugador.innerHTML = `<p>No hay estadísticas disponibles para ${player.name}.</p>`;
                    return;
                }

                detalleJugador.innerHTML = `
      <h3>${player.name}</h3>
      <p><strong>Edad:</strong> ${player.age ?? "N/D"}</p>
      <p><strong>Nacionalidad:</strong> ${player.nationality ?? "N/D"}</p>
      <p><strong>Posición:</strong> ${stats.games?.position ?? "N/D"}</p>
      <p><strong>Partidos:</strong> ${stats.games?.appearences ?? 0}</p>
      <p><strong>Minutos:</strong> ${stats.games?.minutes ?? 0}</p>
      <p><strong>Goles:</strong> ${stats.goals?.total ?? 0}</p>
      <p><strong>Asistencias:</strong> ${stats.goals?.assists ?? 0}</p>
      <p><strong>Tiros totales:</strong> ${stats.shots?.total ?? 0}</p>
      <p><strong>Tiros a puerta:</strong> ${stats.shots?.on ?? 0}</p>
      <p><strong>Pases:</strong> ${stats.passes?.total ?? 0}</p>
      <p><strong>Precisión pase:</strong> ${stats.passes?.accuracy ?? "N/D"}</p>
      <p><strong>Tarjetas amarillas:</strong> ${stats.cards?.yellow ?? 0}</p>
      <p><strong>Tarjetas rojas:</strong> ${stats.cards?.red ?? 0}</p>
    `;
            } catch (error) {
                detalleJugador.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        cargarEquipos();
    </script>
</body>

</html>
